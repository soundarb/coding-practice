<div class="entity-filter">
  <div class="control">
    <!-- Scope dropdown: custom menu so the selected item shows a tick -->
    <div class="select-wrap">
      <button
        type="button"
        class="mode-trigger"
        aria-haspopup="listbox"
        [attr.aria-expanded]="modeMenuOpen()"
        (click)="toggleModeMenu()"
      >
        <span class="mode-trigger-label">{{ modeLabel() }}</span>
      </button>
    </div>

    <!-- Autocomplete textbox -->
    <div class="input-wrap">
      <input
        #queryInput
        type="text"
        class="query-input"
        role="combobox"
        autocomplete="off"
        aria-autocomplete="list"
        [attr.aria-expanded]="open()"
        [value]="query()"
        [placeholder]="placeholder()"
        (focus)="onFocus()"
        (input)="onInput($any($event.target).value)"
        (keydown)="onKeydown($event)"
      />

      @if (showClear()) {
        <button
          type="button"
          class="clear-btn"
          aria-label="Clear filter"
          (click)="clear()"
        >
          &times;
        </button>
      }
    </div>
  </div>

  <!-- Scope menu -->
  @if (modeMenuOpen()) {
    <div class="mode-menu" role="listbox">
      <button
        type="button"
        class="mode-option"
        role="option"
        [attr.aria-selected]="mode() === 'organization'"
        (click)="selectMode('organization')"
      >
        <span class="mode-check">
          @if (mode() === 'organization') {
            <span aria-hidden="true">&#10003;</span>
          }
        </span>
        <span>Organization</span>
      </button>

      <button
        type="button"
        class="mode-option"
        role="option"
        [attr.aria-selected]="mode() === 'skillGroup'"
        (click)="selectMode('skillGroup')"
      >
        <span class="mode-check">
          @if (mode() === 'skillGroup') {
            <span aria-hidden="true">&#10003;</span>
          }
        </span>
        <span>Skill Group</span>
      </button>
    </div>
  }

  <!-- Suggestions -->
  @if (open()) {
    <div class="suggestions" role="listbox">
      @if (loading()) {
        <div class="suggestion-empty">Loading…</div>
      } @else if (filtered().length === 0) {
        <div class="suggestion-empty">No matches</div>
      } @else {
        @for (opt of filtered(); track opt.id; let i = $index) {
          <button
            type="button"
            class="suggestion"
            role="option"
            [class.active]="i === activeIndex()"
            [attr.aria-selected]="i === activeIndex()"
            (click)="select(opt)"
            (mouseenter)="activeIndex.set(i)"
          >
            <span class="suggestion-id">{{ opt.id }}</span>
            <span class="suggestion-sep">&ndash;</span>
            <span class="suggestion-label">{{ opt.label }}</span>
          </button>
        }
      }
    </div>
  }
</div>
